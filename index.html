<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mission Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080b11;font-family:"DM Sans",sans-serif}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
    input[type="time"],input[type="date"]{color-scheme:dark}
    @keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
    #fb-status{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;z-index:9999;pointer-events:none;font-family:"DM Sans",sans-serif;letter-spacing:.05em}
    #fb-status.connecting{background:rgba(244,168,35,.15);color:#f4a823;border:1px solid rgba(244,168,35,.3)}
    #fb-status.connected{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
    #fb-status.offline{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="fb-status" class="connecting">&#9679; Connecting...</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <script>
    const firebaseConfig={
      apiKey:"AIzaSyCj8PxuyCTmOa6jZXnZ6PJ_w0a9u0Qv_mU",
      authDomain:"mission-log-aef65.firebaseapp.com",
      databaseURL:"https://mission-log-aef65-default-rtdb.firebaseio.com",
      projectId:"mission-log-aef65",
      storageBucket:"mission-log-aef65.firebasestorage.app",
      messagingSenderId:"1085357597387",
      appId:"1:1085357597387:web:d46f54d04627cea258f14e"
    };
    firebase.initializeApp(firebaseConfig);
    const _fbdb=firebase.database();
    window.__firebase_db=_fbdb;
    const _s=document.getElementById("fb-status");
    _fbdb.ref(".info/connected").on("value",snap=>{
      if(snap.val()===true){_s.textContent="\u25cf Firebase";_s.className="connected";setTimeout(()=>{_s.style.display="none"},3000);}
      else{_s.textContent="\u26a0 Offline";_s.className="offline";_s.style.display="block";}
    });
    const{useState,useEffect,useRef,useCallback,useMemo}=React;
    const{LineChart,Line,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,ReferenceLine,CartesianGrid}=(window.Recharts||{});
    window.storage={
      get:(k)=>{const v=localStorage.getItem("ml2:"+k);return Promise.resolve(v?{key:k,value:v}:null);},
      set:(k,v)=>{localStorage.setItem("ml2:"+k,v);return Promise.resolve({key:k,value:v});},
      delete:(k)=>{localStorage.removeItem("ml2:"+k);return Promise.resolve({key:k,deleted:true});},
      list:(p)=>{p=p||"";const keys=Object.keys(localStorage).filter(k=>k.startsWith("ml2:")&&k.slice(4).startsWith(p)).map(k=>k.slice(4));return Promise.resolve({keys});}
    };
  </script>

  <script src="app.js"></script>

  <script>
    const _root=ReactDOM.createRoot(document.getElementById("root"));
    _root.render(React.createElement(App));
  </script>
</body>
</html>
